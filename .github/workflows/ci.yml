name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -q
